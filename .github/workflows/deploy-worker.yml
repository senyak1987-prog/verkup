name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Check Cloudflare credentials
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are missing; skipping Worker deploy."
          fi

      - name: Put Worker GitHub token secret
        if: steps.cloudflare.outputs.enabled == 'true'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_GITHUB_TOKEN: ${{ secrets.WORKER_GITHUB_TOKEN }}
        run: |
          if [ -n "$WORKER_GITHUB_TOKEN" ]; then
            printf "%s" "$WORKER_GITHUB_TOKEN" | npx --yes wrangler@4.97.0 secret put GITHUB_TOKEN --config worker/wrangler.toml
          else
            echo "WORKER_GITHUB_TOKEN is empty; keeping existing Worker secret."
          fi

      - name: Put Worker Bitrix webhook secret
        if: steps.cloudflare.outputs.enabled == 'true'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
        run: |
          if [ -n "$BITRIX_WEBHOOK_URL" ]; then
            printf "%s" "$BITRIX_WEBHOOK_URL" | npx --yes wrangler@4.97.0 secret put BITRIX_WEBHOOK_URL --config worker/wrangler.toml
          else
            echo "BITRIX_WEBHOOK_URL is empty; keeping existing Worker secret."
          fi

      - name: Deploy Worker
        if: steps.cloudflare.outputs.enabled == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run worker:deploy
