name: Sync Bitrix deals

on:
  workflow_dispatch:
  repository_dispatch:
    types: [bitrix_deal_started, bitrix_deal_stage_changed, bitrix_instant_sync]

concurrency:
  group: sync-bitrix-deals
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Sync deals from Bitrix24
        env:
          BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
          BITRIX_DOMAIN: verkup.bitrix24.ru
          BITRIX_TZ_STAGE_ID: ${{ secrets.BITRIX_TZ_STAGE_ID }}
          BITRIX_TZ_STAGE_NAME: Подготовка ТЗ
          BITRIX_TZ_APPROVAL_STAGE_ID: ${{ secrets.BITRIX_TZ_APPROVAL_STAGE_ID }}
          BITRIX_TZ_APPROVAL_STAGE_NAME: Согласование ТЗ
          BITRIX_STAGE_ID: ${{ secrets.BITRIX_STAGE_ID }}
          BITRIX_STAGE_NAME: Запустить в производство
          BITRIX_PRODUCTION_STAGE_ID: ${{ secrets.BITRIX_PRODUCTION_STAGE_ID }}
          BITRIX_PRODUCTION_STAGE_NAME: В производстве
          BITRIX_DEFECT_STAGE_ID: ${{ secrets.BITRIX_DEFECT_STAGE_ID }}
          BITRIX_DEFECT_STAGE_NAME: КОСЯК в заказе
          BITRIX_CATEGORY_ID: ${{ secrets.BITRIX_CATEGORY_ID }}
          BITRIX_FIELD_CLASSIFICATION: ${{ secrets.BITRIX_FIELD_CLASSIFICATION }}
          BITRIX_FIELD_INSTALL_AMOUNT: ${{ secrets.BITRIX_FIELD_INSTALL_AMOUNT }}
          BITRIX_FIELD_START_DATE: ${{ secrets.BITRIX_FIELD_START_DATE }}
          BITRIX_FIELD_EXPECTED_FINISH_DATE: ${{ secrets.BITRIX_FIELD_EXPECTED_FINISH_DATE }}
        run: npm run sync:bitrix

      - name: Validate synced data
        run: npm run validate:data

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/deals.json
          git diff --cached --quiet || git commit -m "Sync Bitrix production deals"
          git push

      - name: Build site
        env:
          VITE_SAVE_API_URL: ${{ vars.VITE_SAVE_API_URL }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy GitHub Pages
        uses: actions/deploy-pages@v4
