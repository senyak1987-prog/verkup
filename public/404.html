<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Verkup</title>
    <script>
      (function () {
        var githubBase = "/verkup/";
        var path = window.location.pathname;
        var query = window.location.search ? window.location.search.slice(1) : "";
        var hash = window.location.hash || "";
        var base = path.indexOf(githubBase) === 0 ? githubBase : "/";
        var route = "";

        if (path.indexOf(githubBase) === 0) {
          route = path.slice(base.length).replace(/^\/+|\/+$/g, "");
        } else if (path !== "/") {
          route = path.replace(/^\/+|\/+$/g, "");
        }

        var target = base;
        var params = [];
        if (route) params.push("route=" + encodeURIComponent("/" + route));
        if (query) params.push(query);
        if (params.length) target += "?" + params.join("&");
        target += hash;

        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
